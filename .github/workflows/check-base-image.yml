
name: Check Base Image Updates

on:
  schedule:
    - cron: '0 13 * * 1-5' # Weekdays at 13:00 UTC, 0800 EST
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force trigger update path'
        type: boolean
        default: false

permissions:
  contents: write        # needed to push digest.txt
  issues: write          # needed to create issues via REST API
  pull-requests: write   # if you add a PR step later

jobs:
  check-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install skopeo and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo jq

      - name: Get current digest
        id: get_digest
        run: |
          DIGEST=$(skopeo inspect docker://mcr.microsoft.com/dotnet/sdk:10.0 | jq -r '.Digest')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Current digest: $DIGEST"

      - name: Load last known digest (if present) and compare
        id: compare
        run: |
          LAST_DIGEST=""
          if [ -f digest.txt ]; then
            LAST_DIGEST="$(cat digest.txt)"
          fi
          echo "last_digest=$LAST_DIGEST" >> "$GITHUB_OUTPUT"
          echo "Last digest: $LAST_DIGEST"
          echo "Current digest: ${{ steps.get_digest.outputs.digest }}"

          # Determine update flag
          FORCE="${{ github.event.inputs.force_update }}"
          if [ "$FORCE" = "true" ]; then
            echo "force_update requested"
            echo "update=true" >> "$GITHUB_OUTPUT"
          elif [ "$LAST_DIGEST" != "${{ steps.get_digest.outputs.digest }}" ]; then
            echo "Digest changed"
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "No change"
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save current digest
        run: echo "${{ steps.get_digest.outputs.digest }}" > digest.txt

      - name: Commit digest update (only when changed or forced)
        if: ${{ steps.compare.outputs.update == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add digest.txt
          git commit -m "Update digest to ${{ steps.get_digest.outputs.digest }}" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      # Notification via Issue (GHES-aware REST call)
      - name: Notify via GitHub Issue (REST API)
        if: ${{ steps.compare.outputs.update == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}         # built-in token for this run
          API_URL: ${{ github.api_url }}        # e.g., https://<ghes-host>/api/v3
          REPO: ${{ github.repository }}        # owner/repo
        run: |
          TITLE="Base Image Updated"
          BODY=$(cat <<'EOF'
          The base image **mcr.microsoft.com/dotnet/sdk:10.0** changed.
          New digest: `${{ steps.get_digest.outputs.digest }}`
          Previous digest: `${{ steps.compare.outputs.last_digest }}`
          Please review https://mcr.microsoft.com/en-us/artifact/mar/dotnet/sdk/tag/10.0 
          https://mcr.microsoft.com/en-us/artifact/mar/dotnet/sdk/about
          https://github.com/dotnet/dotnet-docker/tree/main/src/sdk
          for details and determine next steps for rebuilding containers.
          EOF
          )

          curl -sS -X POST "$API_URL/repos/$REPO/issues" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d "$(jq -nc --arg title "$TITLE" --arg body "$BODY" '{title:$title, body:$body}')" \
            --fail
